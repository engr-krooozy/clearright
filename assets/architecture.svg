<svg width="1100" height="720" viewBox="0 0 1100 720" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">

  <!-- Background -->
  <rect width="1100" height="720" fill="#080e1a"/>

  <!-- Title -->
  <text x="550" y="44" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700" letter-spacing="-0.3">ClearRight — System Architecture</text>
  <text x="550" y="64" text-anchor="middle" fill="#475569" font-size="11" letter-spacing="0.05em">GEMINI LIVE AGENT CHALLENGE</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- COLUMN HEADERS -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- Header: Browser -->
  <rect x="30" y="82" width="230" height="26" rx="6" fill="#1e2d45"/>
  <text x="145" y="99" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="700" letter-spacing="0.1em">USER BROWSER</text>

  <!-- Header: Cloud Run -->
  <rect x="290" y="82" width="270" height="26" rx="6" fill="#1e2540"/>
  <circle cx="306" cy="95" r="6" fill="#4285f4"/>
  <text x="420" y="99" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="700" letter-spacing="0.1em">GOOGLE CLOUD RUN</text>

  <!-- Header: Google AI -->
  <rect x="590" y="82" width="480" height="26" rx="6" fill="#1a2535"/>
  <text x="830" y="99" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="700" letter-spacing="0.1em">GOOGLE AI PLATFORM</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- LANE 1: DOCUMENT UPLOAD FLOW -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- Lane label -->
  <text x="16" y="144" fill="#f59e0b" font-size="9" font-weight="700" letter-spacing="0.12em" transform="rotate(-90,16,144)" text-anchor="middle" dominant-baseline="middle">UPLOAD FLOW</text>

  <!-- Browser: Upload widget -->
  <rect x="46" y="118" width="198" height="70" rx="8" fill="#0f1724" stroke="#1e2d45" stroke-width="1.5"/>
  <rect x="46" y="118" width="198" height="24" rx="8" fill="#1e2d45"/>
  <rect x="46" y="130" width="198" height="12" rx="0" fill="#1e2d45"/>
  <text x="145" y="133" text-anchor="middle" fill="#cbd5e1" font-size="10" font-weight="600">Document Upload</text>
  <text x="145" y="152" text-anchor="middle" fill="#64748b" font-size="10">PDF / image (up to 20MB)</text>
  <text x="145" y="168" text-anchor="middle" fill="#64748b" font-size="10">multipart/form-data POST</text>

  <!-- Browser: Analysis display -->
  <rect x="46" y="200" width="198" height="72" rx="8" fill="#0f1724" stroke="#1e2d45" stroke-width="1.5"/>
  <rect x="46" y="200" width="198" height="24" rx="8" fill="#1e2d45"/>
  <rect x="46" y="212" width="198" height="12" rx="0" fill="#1e2d45"/>
  <text x="145" y="216" text-anchor="middle" fill="#cbd5e1" font-size="10" font-weight="600">Analysis Panel</text>
  <text x="145" y="237" text-anchor="middle" fill="#64748b" font-size="10">doc_type · risk_level</text>
  <text x="145" y="252" text-anchor="middle" fill="#64748b" font-size="10">key_points · suggested_questions</text>
  <text x="145" y="266" text-anchor="middle" fill="#10b981" font-size="10">Tap-to-ask question chips</text>

  <!-- Backend: Upload endpoint -->
  <rect x="306" y="118" width="238" height="70" rx="8" fill="#0f1724" stroke="#1e2d45" stroke-width="1.5"/>
  <rect x="306" y="118" width="238" height="24" rx="8" fill="#1e2d45"/>
  <rect x="306" y="130" width="238" height="12" rx="0" fill="#1e2d45"/>
  <text x="425" y="133" text-anchor="middle" fill="#cbd5e1" font-size="10" font-weight="600">POST /upload  (FastAPI)</text>
  <text x="425" y="152" text-anchor="middle" fill="#64748b" font-size="10">Validates file type + size</text>
  <text x="425" y="168" text-anchor="middle" fill="#64748b" font-size="10">Stores text in document_store{}</text>

  <!-- Backend: Analysis call -->
  <rect x="306" y="200" width="238" height="72" rx="8" fill="#0f1724" stroke="#1e2d45" stroke-width="1.5"/>
  <rect x="306" y="200" width="238" height="24" rx="8" fill="#1e2d45"/>
  <rect x="306" y="212" width="238" height="12" rx="0" fill="#1e2d45"/>
  <text x="425" y="216" text-anchor="middle" fill="#cbd5e1" font-size="10" font-weight="600">Document Analysis (Python)</text>
  <text x="425" y="237" text-anchor="middle" fill="#64748b" font-size="10">2× Gemini calls: extract then analyse</text>
  <text x="425" y="252" text-anchor="middle" fill="#64748b" font-size="10">Returns structured JSON</text>
  <text x="425" y="266" text-anchor="middle" fill="#f59e0b" font-size="10">gemini-2.5-flash (vision)</text>

  <!-- Google AI: Gemini Flash box -->
  <rect x="606" y="118" width="448" height="154" rx="8" fill="#0f1724" stroke="#1e2d45" stroke-width="1.5"/>
  <rect x="606" y="118" width="448" height="24" rx="8" fill="#1e2d45"/>
  <rect x="606" y="130" width="448" height="12" rx="0" fill="#1e2d45"/>
  <text x="830" y="133" text-anchor="middle" fill="#cbd5e1" font-size="10" font-weight="600">Gemini 2.5 Flash  (generate_content)</text>
  <!-- call 1 -->
  <rect x="622" y="150" width="196" height="56" rx="6" fill="#111827" stroke="#1e2d45" stroke-width="1"/>
  <text x="720" y="167" text-anchor="middle" fill="#f59e0b" font-size="10" font-weight="600">Call 1 — Extraction</text>
  <text x="720" y="183" text-anchor="middle" fill="#64748b" font-size="9.5">Reads file bytes via Part.from_bytes</text>
  <text x="720" y="197" text-anchor="middle" fill="#64748b" font-size="9.5">Returns full document text</text>
  <!-- call 2 -->
  <rect x="836" y="150" width="202" height="56" rx="6" fill="#111827" stroke="#1e2d45" stroke-width="1"/>
  <text x="937" y="167" text-anchor="middle" fill="#f59e0b" font-size="10" font-weight="600">Call 2 — Analysis</text>
  <text x="937" y="183" text-anchor="middle" fill="#64748b" font-size="9.5">Receives extracted text</text>
  <text x="937" y="197" text-anchor="middle" fill="#64748b" font-size="9.5">Returns structured JSON</text>
  <!-- separator arrow between calls -->
  <line x1="818" y1="178" x2="836" y2="178" stroke="#475569" stroke-width="1" stroke-dasharray="3,2"/>
  <polygon points="835,174 843,178 835,182" fill="#475569"/>
  <!-- content at bottom -->
  <text x="830" y="242" text-anchor="middle" fill="#64748b" font-size="9.5">{ doc_type, risk_level, key_points[], suggested_questions[] }</text>
  <text x="830" y="258" text-anchor="middle" fill="#64748b" font-size="9.5">Fault-tolerant: analysis failure is non-fatal</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- UPLOAD FLOW ARROWS -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- Browser → Backend (upload) -->
  <line x1="244" y1="153" x2="306" y2="153" stroke="#f59e0b" stroke-width="1.8" stroke-dasharray="5,3"/>
  <polygon points="304,149 312,153 304,157" fill="#f59e0b"/>
  <text x="275" y="147" text-anchor="middle" fill="#f59e0b" font-size="9">POST</text>

  <!-- Backend → Google AI (extract) -->
  <line x1="544" y1="153" x2="606" y2="153" stroke="#f59e0b" stroke-width="1.8" stroke-dasharray="5,3"/>
  <polygon points="604,149 612,153 604,157" fill="#f59e0b"/>

  <!-- Backend ← Google AI (analysis JSON back) -->
  <line x1="606" y1="234" x2="544" y2="234" stroke="#f59e0b" stroke-width="1.8" stroke-dasharray="5,3"/>
  <polygon points="546,230 538,234 546,238" fill="#f59e0b"/>

  <!-- Browser ← Backend (analysis response) -->
  <line x1="306" y1="234" x2="244" y2="234" stroke="#f59e0b" stroke-width="1.8" stroke-dasharray="5,3"/>
  <polygon points="246,230 238,234 246,238" fill="#f59e0b"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- LANE DIVIDER -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <line x1="30" y1="306" x2="1070" y2="306" stroke="#1e2d45" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- LANE 2: LIVE SESSION FLOW -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <text x="16" y="490" fill="#10b981" font-size="9" font-weight="700" letter-spacing="0.12em" transform="rotate(-90,16,490)" text-anchor="middle" dominant-baseline="middle">LIVE SESSION FLOW</text>

  <!-- Browser: Audio recorder -->
  <rect x="46" y="320" width="198" height="68" rx="8" fill="#0f1724" stroke="#1e2d45" stroke-width="1.5"/>
  <rect x="46" y="320" width="198" height="24" rx="8" fill="#1e2d45"/>
  <rect x="46" y="332" width="198" height="12" rx="0" fill="#1e2d45"/>
  <text x="145" y="336" text-anchor="middle" fill="#cbd5e1" font-size="10" font-weight="600">AudioWorklet Recorder</text>
  <text x="145" y="355" text-anchor="middle" fill="#64748b" font-size="10">16kHz PCM capture + VAD</text>
  <text x="145" y="370" text-anchor="middle" fill="#64748b" font-size="10">Mic energy → speaking state</text>

  <!-- Browser: Video frames -->
  <rect x="46" y="400" width="198" height="54" rx="8" fill="#0f1724" stroke="#1e2d45" stroke-width="1.5"/>
  <rect x="46" y="400" width="198" height="24" rx="8" fill="#1e2d45"/>
  <rect x="46" y="412" width="198" height="12" rx="0" fill="#1e2d45"/>
  <text x="145" y="416" text-anchor="middle" fill="#cbd5e1" font-size="10" font-weight="600">Video Frame Capture</text>
  <text x="145" y="436" text-anchor="middle" fill="#64748b" font-size="10">Camera / screen share</text>
  <text x="145" y="448" text-anchor="middle" fill="#64748b" font-size="10">JPEG frames @ 1fps</text>

  <!-- Browser: Audio player -->
  <rect x="46" y="466" width="198" height="54" rx="8" fill="#0f1724" stroke="#1e2d45" stroke-width="1.5"/>
  <rect x="46" y="466" width="198" height="24" rx="8" fill="#1e2d45"/>
  <rect x="46" y="478" width="198" height="12" rx="0" fill="#1e2d45"/>
  <text x="145" y="482" text-anchor="middle" fill="#cbd5e1" font-size="10" font-weight="600">AudioWorklet Player</text>
  <text x="145" y="502" text-anchor="middle" fill="#64748b" font-size="10">24kHz PCM → speaker</text>
  <text x="145" y="514" text-anchor="middle" fill="#64748b" font-size="10">Flush on user speech start</text>

  <!-- Backend: WebSocket endpoint -->
  <rect x="306" y="320" width="238" height="68" rx="8" fill="#0f1724" stroke="#1e2d45" stroke-width="1.5"/>
  <rect x="306" y="320" width="238" height="24" rx="8" fill="#1e2d45"/>
  <rect x="306" y="332" width="238" height="12" rx="0" fill="#1e2d45"/>
  <text x="425" y="336" text-anchor="middle" fill="#cbd5e1" font-size="10" font-weight="600">WebSocket  /ws/{user_id}</text>
  <text x="425" y="355" text-anchor="middle" fill="#64748b" font-size="10">Accepts audio/pcm + image/jpeg</text>
  <text x="425" y="370" text-anchor="middle" fill="#64748b" font-size="10">Injects document context at start</text>

  <!-- Backend: ADK Runner -->
  <rect x="306" y="400" width="238" height="120" rx="8" fill="#0f1724" stroke="#1e2d45" stroke-width="1.5"/>
  <rect x="306" y="400" width="238" height="24" rx="8" fill="#1e2d45"/>
  <rect x="306" y="412" width="238" height="12" rx="0" fill="#1e2d45"/>
  <text x="425" y="416" text-anchor="middle" fill="#cbd5e1" font-size="10" font-weight="600">Google ADK  (InMemoryRunner)</text>
  <rect x="318" y="430" width="102" height="42" rx="5" fill="#111827" stroke="#1e2d45" stroke-width="1"/>
  <text x="369" y="447" text-anchor="middle" fill="#94a3b8" font-size="9.5" font-weight="600">LiveRequestQueue</text>
  <text x="369" y="461" text-anchor="middle" fill="#64748b" font-size="9">send_content / send_realtime</text>
  <rect x="428" y="430" width="104" height="42" rx="5" fill="#111827" stroke="#1e2d45" stroke-width="1"/>
  <text x="480" y="447" text-anchor="middle" fill="#94a3b8" font-size="9.5" font-weight="600">RunConfig</text>
  <text x="480" y="461" text-anchor="middle" fill="#64748b" font-size="9">bidi · AUDIO · VAD</text>
  <text x="425" y="496" text-anchor="middle" fill="#64748b" font-size="9.5">Session per user_id · InMemory state</text>
  <text x="425" y="511" text-anchor="middle" fill="#64748b" font-size="9.5">asyncio tasks: agent↔client messaging</text>

  <!-- Google AI: Live API box -->
  <rect x="606" y="320" width="448" height="200" rx="8" fill="#0f1724" stroke="#1e2d45" stroke-width="1.5"/>
  <rect x="606" y="320" width="448" height="24" rx="8" fill="#1e2d45"/>
  <rect x="606" y="332" width="448" height="12" rx="0" fill="#1e2d45"/>
  <text x="830" y="336" text-anchor="middle" fill="#cbd5e1" font-size="10" font-weight="600">Gemini Live API  —  bidi streaming</text>

  <!-- Model box -->
  <rect x="622" y="352" width="280" height="72" rx="6" fill="#111827" stroke="#064e35" stroke-width="1.5"/>
  <text x="762" y="370" text-anchor="middle" fill="#10b981" font-size="10" font-weight="700">gemini-2.5-flash-native-audio-latest</text>
  <text x="762" y="387" text-anchor="middle" fill="#64748b" font-size="9.5">Native audio model (audio-in / audio-out)</text>
  <text x="762" y="402" text-anchor="middle" fill="#64748b" font-size="9.5">Speech config: Aoede voice · en-US</text>
  <text x="762" y="416" text-anchor="middle" fill="#64748b" font-size="9.5">VAD: high sensitivity · 200ms silence</text>

  <!-- google_search tool box -->
  <rect x="918" y="352" width="120" height="72" rx="6" fill="#111827" stroke="#1e2d45" stroke-width="1"/>
  <text x="978" y="373" text-anchor="middle" fill="#3b82f6" font-size="10" font-weight="600">google_search</text>
  <text x="978" y="389" text-anchor="middle" fill="#64748b" font-size="9">ADK built-in tool</text>
  <text x="978" y="405" text-anchor="middle" fill="#64748b" font-size="9">Legal grounding</text>
  <text x="978" y="418" text-anchor="middle" fill="#64748b" font-size="9">Real-time results</text>

  <!-- Arrow: model calls tool -->
  <line x1="902" y1="386" x2="918" y2="386" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="916,382 924,386 916,390" fill="#3b82f6"/>
  <text x="910" y="380" text-anchor="middle" fill="#3b82f6" font-size="8">tool call</text>

  <!-- Clara persona note -->
  <rect x="622" y="434" width="416" height="72" rx="6" fill="#111827" stroke="#1e2d45" stroke-width="1"/>
  <text x="830" y="452" text-anchor="middle" fill="#94a3b8" font-size="9.5" font-weight="600">Clara — Legal Information Agent</text>
  <text x="830" y="468" text-anchor="middle" fill="#64748b" font-size="9">Compassionate · Non-alarmist · Plain English · Always refers to legal aid for advice</text>
  <text x="830" y="484" text-anchor="middle" fill="#64748b" font-size="9">Specialises in: tenant rights, employment, debt collection, immigration, court documents</text>
  <text x="830" y="498" text-anchor="middle" fill="#64748b" font-size="9">Grounded via google_search · Cites sources · Avoids hallucination</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- LIVE SESSION ARROWS -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- Browser audio → WebSocket -->
  <line x1="244" y1="354" x2="306" y2="354" stroke="#10b981" stroke-width="2"/>
  <polygon points="304,350 312,354 304,358" fill="#10b981"/>
  <text x="275" y="347" text-anchor="middle" fill="#10b981" font-size="9">audio/pcm</text>

  <!-- Browser video → WebSocket -->
  <line x1="244" y1="427" x2="306" y2="354" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="268" y="398" text-anchor="middle" fill="#3b82f6" font-size="9">image/jpeg</text>

  <!-- WebSocket → ADK -->
  <line x1="425" y1="388" x2="425" y2="400" stroke="#10b981" stroke-width="1.8"/>
  <polygon points="421,398 425,406 429,398" fill="#10b981"/>

  <!-- ADK → Live API -->
  <line x1="544" y1="430" x2="606" y2="390" stroke="#10b981" stroke-width="2"/>
  <polygon points="604,386 612,390 608,398" fill="#10b981"/>

  <!-- Live API audio → ADK → WebSocket → Browser (response) -->
  <line x1="606" y1="410" x2="544" y2="460" stroke="#10b981" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="546,456 538,462 542,470" fill="#10b981"/>
  <text x="573" y="448" text-anchor="middle" fill="#10b981" font-size="9">audio/pcm</text>
  <line x1="306" y1="489" x2="244" y2="489" stroke="#10b981" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="246,485 238,489 246,493" fill="#10b981"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- LEGEND -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <rect x="30" y="645" width="1040" height="60" rx="8" fill="#0f1724" stroke="#1e2d45" stroke-width="1"/>
  <text x="60" y="663" fill="#475569" font-size="9" font-weight="700" letter-spacing="0.1em">LEGEND</text>

  <!-- amber dashed -->
  <line x1="100" y1="682" x2="148" y2="682" stroke="#f59e0b" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="146,678 154,682 146,686" fill="#f59e0b"/>
  <text x="160" y="686" fill="#94a3b8" font-size="10">Document upload / analysis flow</text>

  <!-- emerald solid -->
  <line x1="320" y1="682" x2="368" y2="682" stroke="#10b981" stroke-width="2"/>
  <polygon points="366,678 374,682 366,686" fill="#10b981"/>
  <text x="380" y="686" fill="#94a3b8" font-size="10">Live audio stream (real-time)</text>

  <!-- emerald dashed -->
  <line x1="520" y1="682" x2="568" y2="682" stroke="#10b981" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="566,678 574,682 566,686" fill="#10b981"/>
  <text x="580" y="686" fill="#94a3b8" font-size="10">Audio response from agent</text>

  <!-- blue dashed -->
  <line x1="730" y1="682" x2="778" y2="682" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="776,678 784,682 776,686" fill="#3b82f6"/>
  <text x="790" y="686" fill="#94a3b8" font-size="10">Video frames / tool calls</text>

</svg>
